name: Drift — Selection (every 3 days)

on:
  schedule:
    # Runs every 3 days at 2:17 PM UTC (10:17 AM ET)
    - cron: '17 14 */3 * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  select:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run selection script
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python blind_select.py \
            --city atlanta \
            --api-key "$GOOGLE_PLACES_API_KEY" \
            --pick \
            --mode llm \
            --llm-api-key "$LLM_API_KEY" \
            --llm-provider gemini \
            --log-dir audit_log

      - name: Archive today's HTML snapshot
        run: |
          mkdir -p html_archive
          cp index.html "html_archive/$(date -u +%Y-%m-%d).html"
          if [ -f data/photo.jpg ]; then
            cp data/photo.jpg "html_archive/$(date -u +%Y-%m-%d).jpg"
          fi

      - name: Commit and push
        run: |
          git config user.name "blind-bot"
          git config user.email "blind-bot@users.noreply.github.com"
          git add data/current.json data/photo.jpg data/drift_state.json audit_log/ html_archive/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Selection: $(date -u +%Y-%m-%d)"
          git push

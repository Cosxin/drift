<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drift</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullpage.js@4/dist/fullpage.min.css">
  <style>
    /* ── Reset & Variables ──────────────────────────── */

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808;
      --bg-alt: #0b0b0a;
      --text: #d8d0c4;
      --text-muted: #6b6560;
      --text-dim: #3d3a36;
      --accent: #c9a84c;
      --accent-dim: #8a7435;
      --card-bg: #0f0f0e;
      --card-border: #1e1d1a;
      --serif: 'Georgia', 'Times New Roman', serif;
      --mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }

    html {
      font-size: 17px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Film Grain ─────────────────────────────────── */

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ── Section: fullPage-style panels ────────────── */

    .section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 2.5rem;
      position: relative;
    }

    .section-inner {
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Scroll-reveal ──────────────────────────────── */

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-d1 { transition-delay: 0.1s; }
    .reveal-d2 { transition-delay: 0.25s; }
    .reveal-d3 { transition-delay: 0.4s; }
    .reveal-d4 { transition-delay: 0.55s; }
    .reveal-d5 { transition-delay: 0.7s; }

    /* ── Page 1: The Walk ───────────────────────────── */

    #page-walk {
      background: var(--bg);
      justify-content: flex-start;
      padding-top: 3rem;
    }

    .walk-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--card-border);
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      color: #fff;
      font-weight: 400;
    }

    .date {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

.neighborhood-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 1.25rem;
    }

    .coordinates {
      font-family: var(--mono);
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      line-height: 1.3;
    }

    .coordinates .deg { color: var(--accent-dim); }
    .coordinates .sep { display: inline-block; width: 1rem; }

    .nothing-marker {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-top: 1rem;
    }

    .scroll-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 20px;
      background: var(--text-dim);
      margin: 0.4rem auto 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* ── Trajectory Grid ──────────────────────────────── */

    .trajectory-container {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 55vh;
      overflow: hidden;
      pointer-events: none;
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.15) 15%, rgba(0,0,0,0.7) 50%, black 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.15) 15%, rgba(0,0,0,0.7) 50%, black 100%);
      transition: transform 0.05s linear;
      will-change: transform;
    }

    .trajectory-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .grid-line {
      stroke: rgba(100, 220, 255, 0.10);
      stroke-width: 0.5;
      fill: none;
    }

    .grid-line-accent {
      stroke: rgba(100, 220, 255, 0.20);
      stroke-width: 0.7;
      fill: none;
      filter: url(#gridGlow);
    }

    .trajectory-path {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: drawPath 3s ease-out 0.5s forwards;
    }

    .trajectory-glow {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.3;
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: drawPath 3s ease-out 0.5s forwards;
    }

    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }

    .trajectory-endpoint {
      opacity: 0;
      animation: endpointAppear 0.6s ease-out 3.2s forwards;
    }

    .endpoint-ring {
      fill: none;
      stroke: #64dcff;
      stroke-width: 1.5;
      opacity: 0;
      animation: endpointAppear 0.6s ease-out 3.4s forwards, ringPulse 2.5s ease-in-out 3.4s infinite;
    }

    @keyframes endpointAppear {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.4; r: 8; }
      50% { opacity: 0; r: 18; }
    }

    .trajectory-path.scroll-driven,
    .trajectory-glow.scroll-driven {
      animation: none;
    }

    .trajectory-endpoint.scroll-driven,
    .endpoint-ring.scroll-driven {
      animation: none;
    }

    .horizon-glow {
      stop-color: rgba(100, 220, 255, 0.06);
    }

    /* ── Page 2: Discovery ──────────────────────────── */

    #page-discovery {
      background: var(--bg-alt);
    }

    #page-discovery .section-inner {
      max-width: 960px;
    }

    .discovery-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .restaurant-name {
      font-size: 2.4rem;
      font-weight: 400;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 0.4rem;
      max-width: 640px;
    }

    .restaurant-address {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .restaurant-meta {
      max-width: 640px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent-dim);
      margin-bottom: 2rem;
    }

    .restaurant-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .meta-row {
      display: flex;
      gap: 1rem;
      align-items: baseline;
    }

    .meta-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      min-width: 70px;
      flex-shrink: 0;
    }

    .meta-value {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.7;
    }

    .meta-value a {
      color: var(--accent);
      text-decoration: none;
    }

    .meta-value a:hover { text-decoration: underline; }

    .rating-stars { color: var(--accent); }

    .hours-grid {
      font-size: 0.85rem;
      line-height: 1.7;
    }

    .hours-grid .closed { color: var(--text-muted); }

    .reasoning {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-style: italic;
      border-top: 1px solid var(--card-border);
      padding-top: 1.5rem;
      margin-top: 0.5rem;
      line-height: 1.8;
      max-width: 640px;
    }

    .reasoning-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-dim);
      font-style: normal;
      margin-bottom: 0.5rem;
    }

    /* ── Page 3: About ──────────────────────────────── */

    #page-about {
      background: var(--bg);
    }

    #page-about .section-inner {
      max-width: 960px;
    }

    .about-title {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 2rem;
    }

    .about-text {
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 2.5rem;
      max-width: 640px;
    }

    .about-rules {
      list-style: none;
      margin-bottom: 3rem;
      max-width: 640px;
    }

    .about-rules li {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 0.55rem 0;
      padding-left: 1rem;
      position: relative;
    }

    .about-rules li::before {
      content: '\2014';
      position: absolute;
      left: 0;
      color: var(--text-dim);
    }

    .about-links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .about-link {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      padding: 0.75rem 1rem;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      transition: border-color 0.2s, color 0.2s;
      width: fit-content;
    }

    .about-link:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .about-footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--card-border);
      font-size: 0.75rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    /* ── Recent Picks ──────────────────────────────── */

    .recent-picks {
      margin-bottom: 2rem;
      max-width: 640px;
    }

    .recent-picks-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 1rem;
    }

    .recent-pick-card {
      padding: 0.75rem 1rem;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      margin-bottom: 0.5rem;
      transition: border-color 0.2s;
    }

    .recent-pick-card:hover {
      border-color: var(--accent-dim);
    }

    .recent-pick-empty {
      opacity: 0.25;
    }

    .recent-pick-placeholder {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .recent-pick-link {
      text-decoration: none;
      display: block;
    }

    .recent-pick-name {
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.2rem;
    }

    .recent-pick-link:hover .recent-pick-name {
      color: var(--accent);
    }

    .recent-pick-detail {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .recent-pick-date {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }

    /* ── fullPage.js navigation dots ─────────────────── */

    #fp-nav ul li a span,
    .fp-slidesNav ul li a span {
      background: var(--text-dim) !important;
      width: 6px !important;
      height: 6px !important;
      margin: -3px 0 0 -3px !important;
    }

    #fp-nav ul li a.active span,
    #fp-nav ul li:hover a span {
      background: var(--accent) !important;
    }

    /* ── Noscript ──────────────────────────────────── */

    noscript .noscript-msg {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* ── Loading ────────────────────────────────────── */

    .loading-screen {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* ── Responsive ─────────────────────────────────── */

    @media (max-width: 700px) {
      .section { padding: 2rem 1.5rem; }
      #page-walk { padding-top: 2rem; }

.logo { font-size: 1.3rem; }
      .restaurant-name { font-size: 1.8rem; }
      .coordinates { font-size: 1rem; }
      .trajectory-container { height: 50vh; }
    }

    @media (max-width: 480px) {
      html { font-size: 15px; }
      .page-dots { right: 0.75rem; }
      .dot { width: 5px; height: 5px; }
    }
  </style>
</head>
<body>

  <noscript>
    <div class="noscript-msg">
      <p>Drift is an AI agent wandering Atlanta, discovering small independent restaurants.</p>
      <p style="margin-top:1rem;">This site requires JavaScript to load today's data.</p>
    </div>
  </noscript>

  <div id="app">
    <div class="loading-screen" id="loading">...</div>
  </div>

  <script>
    (function () {
      /* ── Helpers ────────────────────────────────────── */

      function esc(s) {
        if (!s) return '';
        var el = document.createElement('span');
        el.textContent = s;
        return el.innerHTML;
      }

      function formatDate(ts) {
        try {
          var d = new Date(ts);
          var m = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];
          return m[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
        } catch (e) { return ts ? ts.slice(0, 10) : ''; }
      }

      function stars(r) {
        var f = Math.floor(r), h = (r - f >= 0.25) ? 1 : 0, e = 5 - f - h;
        return '<span class="rating-stars">' + '\u2605'.repeat(f) + (h ? '\u00BD' : '') + '\u2606'.repeat(e) + '</span>';
      }

      function coordHtml(lat, lng) {
        var la = Math.abs(lat).toFixed(4), lo = Math.abs(lng).toFixed(4);
        return la + '<span class="deg">\u00B0</span>' + (lat >= 0 ? 'N' : 'S')
          + '<span class="sep"></span>'
          + lo + '<span class="deg">\u00B0</span>' + (lng >= 0 ? 'E' : 'W');
      }

      function coordText(lat, lng) {
        var la = Math.abs(lat).toFixed(4), lo = Math.abs(lng).toFixed(4);
        return la + '\u00B0' + (lat >= 0 ? 'N' : 'S') + '  ' + lo + '\u00B0' + (lng >= 0 ? 'E' : 'W');
      }

      /* ── Page 1: The Walk ──────────────────────────── */

      function buildPage1(data) {
        var sel = data.selected;
        var lat = sel ? sel.lat : null;
        var lng = sel ? sel.lng : null;
        var nbr = esc(data.neighborhood_searched || '');

        var h = '<div class="section-inner">';

        // Header: Drift title on top
        h += '<div class="walk-header reveal">';
        h += '<div class="logo">Drift</div>';
        h += '<div class="date">' + formatDate(data.timestamp) + '</div>';
        h += '</div>';

        // "What this is" intro text
        h += '<div class="about-text reveal reveal-d1" style="margin-bottom:2.5rem;">'
          + 'An AI agent exploring Atlanta, one neighborhood at a time.<br><br>'
          + 'It drifts a little further with every walk \u2014 discovering small, family-owned restaurants that deserve a spotlight.'
          + '</div>';

        h += '<div class="neighborhood-label reveal reveal-d2">' + nbr + '</div>';
        if (lat != null && lng != null) {
          h += '<div class="coordinates reveal reveal-d3">' + coordHtml(lat, lng) + '</div>';
        }
        if (!sel) {
          h += '<div class="nothing-marker reveal reveal-d3">Nothing today.</div>';
        }
        h += '</div>'; // section-inner

        // Trajectory grid SVG
        h += buildTrajectoryGrid();

        if (sel) {
          h += '<div class="scroll-hint">scroll</div>';
        }
        return h;
      }

      /* ── Trajectory Grid SVG ─────────────────────────── */

      function buildTrajectoryGrid() {
        var VW = 800, VH = 500;
        var VPX = VW / 2;

        // Tuned grid params
        var gp = {
          amp: 95, sigX: 0.22, sigZ: 0.16,
          cx: 0.46, cz: 0.46, peaks: 2,
          density: 40, opacity: 0.3, aopacity: 0.5,
          vpy: 150, fov: 1.2
        };

        function getPeaks() {
          var p = [];
          p.push({ cx: gp.cx, cz: gp.cz, amp: gp.amp, sigX: gp.sigX, sigZ: gp.sigZ });
          if (gp.peaks >= 2) {
            p.push({ cx: gp.cx - 0.55, cz: gp.cz + 0.15, amp: gp.amp * 0.6, sigX: gp.sigX * 0.7, sigZ: gp.sigZ * 0.8 });
          }
          if (gp.peaks >= 3) {
            p.push({ cx: gp.cx + 0.5, cz: gp.cz - 0.05, amp: gp.amp * 0.5, sigX: gp.sigX * 0.6, sigZ: gp.sigZ * 0.9 });
          }
          return p;
        }

        function heightAt(gx, gz) {
          var peaks = getPeaks();
          var h = 0;
          for (var i = 0; i < peaks.length; i++) {
            var pk = peaks[i];
            var dx = (gx - pk.cx) / pk.sigX;
            var dz = (gz - pk.cz) / pk.sigZ;
            h += pk.amp * Math.exp(-0.5 * (dx * dx + dz * dz));
          }
          return h;
        }

        function project(gx, gz) {
          var t = 0.04 + gz * 0.96;
          var sx = VPX + (gx * VW * gp.fov) * t;
          var sy = gp.vpy + (VH - gp.vpy) * t;
          sy -= heightAt(gx, gz) * t;
          return [+sx.toFixed(1), +sy.toFixed(1)];
        }

        var s = '<div class="trajectory-container">';
        s += '<svg class="trajectory-svg" viewBox="0 0 ' + VW + ' ' + VH + '" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">';

        s += '<defs>';
        s += '<linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">';
        s += '<stop offset="0%" stop-color="#a855f7"/>';
        s += '<stop offset="40%" stop-color="#64dcff"/>';
        s += '<stop offset="100%" stop-color="#06ffa5"/>';
        s += '</linearGradient>';
        s += '<linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">';
        s += '<stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>';
        s += '<stop offset="100%" stop-color="#06ffa5" stop-opacity="0.2"/>';
        s += '</linearGradient>';
        s += '<radialGradient id="endGlow" cx="50%" cy="50%" r="50%">';
        s += '<stop offset="0%" stop-color="#64dcff" stop-opacity="0.8"/>';
        s += '<stop offset="100%" stop-color="#64dcff" stop-opacity="0"/>';
        s += '</radialGradient>';
        s += '<radialGradient id="horizonGlow" cx="50%" cy="0%" r="80%">';
        s += '<stop offset="0%" stop-color="rgba(100,220,255,0.10)"/>';
        s += '<stop offset="100%" stop-color="rgba(100,220,255,0)"/>';
        s += '</radialGradient>';
        s += '<filter id="gridGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
        s += '</defs>';

        // Horizon glow
        s += '<ellipse cx="' + VPX + '" cy="' + (gp.vpy + 30) + '" rx="350" ry="100" fill="url(#horizonGlow)"/>';

        var N = gp.density;
        var samples = 30;

        // Horizontal grid lines (constant gz, sweep gx)
        for (var i = 0; i <= N; i++) {
          var gz = i / N;
          var isAccent = (i % 4 === 0);
          var op = isAccent ? gp.aopacity : gp.opacity;
          var sw = isAccent ? 0.8 : 0.5;
          var hd = '';
          for (var si = 0; si <= samples; si++) {
            var gx = -1.3 + (2.6 * si / samples);
            var pt = project(gx, gz);
            hd += (si === 0 ? 'M' : 'L') + pt[0] + ',' + pt[1];
          }
          if (isAccent) {
            s += '<path d="' + hd + '" stroke="rgba(100,220,255,' + op + ')" stroke-width="' + sw + '" fill="none" filter="url(#gridGlow)"/>';
          } else {
            s += '<path d="' + hd + '" stroke="rgba(100,220,255,' + op + ')" stroke-width="' + sw + '" fill="none"/>';
          }
        }

        // Vertical grid lines (constant gx, sweep gz)
        for (var j = 0; j <= N; j++) {
          var gx2 = -1.0 + (2.0 * j / N);
          var isAccent2 = (j === Math.floor(N / 2)) || (j % 4 === 0);
          var op2 = isAccent2 ? gp.aopacity : gp.opacity;
          var sw2 = isAccent2 ? 0.8 : 0.5;
          var vd = '';
          for (var sj = 0; sj <= samples; sj++) {
            var gz2 = 0.01 + (0.99 * sj / samples);
            var pt2 = project(gx2, gz2);
            vd += (sj === 0 ? 'M' : 'L') + pt2[0] + ',' + pt2[1];
          }
          if (isAccent2) {
            s += '<path d="' + vd + '" stroke="rgba(100,220,255,' + op2 + ')" stroke-width="' + sw2 + '" fill="none" filter="url(#gridGlow)"/>';
          } else {
            s += '<path d="' + vd + '" stroke="rgba(100,220,255,' + op2 + ')" stroke-width="' + sw2 + '" fill="none"/>';
          }
        }

        // Trajectory waypoints in ground-plane coords
        var waypoints = [
          [-0.40, 0.95], [-0.30, 0.82], [-0.18, 0.72], [-0.22, 0.62],
          [-0.08, 0.53], [ 0.05, 0.46], [ 0.15, 0.38], [ 0.02, 0.30],
          [ 0.12, 0.22], [ 0.20, 0.15], [ 0.15, 0.08]
        ];

        var pts = [];
        for (var k = 0; k < waypoints.length; k++) {
          var p = project(waypoints[k][0], waypoints[k][1]);
          pts.push(p);
        }

        // Build smooth quadratic Bézier path
        var d = 'M' + pts[0][0] + ',' + pts[0][1];
        for (var m = 1; m < pts.length; m++) {
          if (m < pts.length - 1) {
            var cpx = pts[m][0];
            var cpy = pts[m][1];
            var ex = (pts[m][0] + pts[m+1][0]) / 2;
            var ey = (pts[m][1] + pts[m+1][1]) / 2;
            d += ' Q' + cpx + ',' + cpy + ' ' + ex.toFixed(1) + ',' + ey.toFixed(1);
          } else {
            d += ' L' + pts[m][0] + ',' + pts[m][1];
          }
        }

        // Glow layer
        s += '<path d="' + d + '" class="trajectory-glow" stroke="url(#glowGrad)"/>';
        // Main path
        s += '<path d="' + d + '" class="trajectory-path" stroke="url(#pathGrad)"/>';

        // Endpoint
        var ep = pts[pts.length - 1];
        s += '<circle cx="' + ep[0] + '" cy="' + ep[1] + '" r="14" fill="url(#endGlow)" class="trajectory-endpoint"/>';
        s += '<circle cx="' + ep[0] + '" cy="' + ep[1] + '" r="3.5" fill="#64dcff" class="trajectory-endpoint"/>';
        s += '<circle cx="' + ep[0] + '" cy="' + ep[1] + '" r="8" class="endpoint-ring"/>';

        // Small dots at each waypoint
        for (var n = 0; n < pts.length - 1; n++) {
          var wo = 0.2 + (n / pts.length) * 0.5;
          s += '<circle cx="' + pts[n][0] + '" cy="' + pts[n][1] + '" r="1.5" fill="#64dcff" opacity="' + wo.toFixed(2) + '" class="trajectory-endpoint"/>';
        }

        s += '</svg></div>';
        return s;
      }

      /* ── Page 2: Discovery ─────────────────────────── */

      function buildPage2(data) {
        var sel = data.selected;
        if (!sel) return '';

        var h = '<div class="section-inner">';
        h += '<div class="discovery-label reveal">Discovery</div>';
        h += '<div class="restaurant-name reveal reveal-d1">' + esc(sel.name) + '</div>';
        h += '<div class="restaurant-address reveal reveal-d1">' + esc(sel.address) + '</div>';
        h += '<div class="divider reveal reveal-d2"></div>';
        h += '<div class="restaurant-meta reveal reveal-d2">';

        if (sel.rating) {
          h += '<div class="meta-row"><span class="meta-label">Rating</span>'
            + '<span class="meta-value">' + sel.rating + ' ' + stars(sel.rating)
            + ' <span style="color:var(--text-muted);font-size:0.8rem;">(' + (sel.review_count || 0) + ')</span></span></div>';
        }
        if (sel.phone) {
          h += '<div class="meta-row"><span class="meta-label">Phone</span>'
            + '<span class="meta-value"><a href="tel:' + esc(sel.phone) + '">' + esc(sel.phone) + '</a></span></div>';
        }
        if (sel.website) {
          var du = sel.website.replace(/^https?:\/\//, '').replace(/\/$/, '');
          h += '<div class="meta-row"><span class="meta-label">Website</span>'
            + '<span class="meta-value"><a href="' + esc(sel.website) + '" target="_blank" rel="noopener">' + esc(du) + '</a></span></div>';
        }
        if (sel.google_maps_url) {
          h += '<div class="meta-row"><span class="meta-label">Maps</span>'
            + '<span class="meta-value"><a href="' + esc(sel.google_maps_url) + '" target="_blank" rel="noopener">View on Google Maps</a></span></div>';
        }
        if (sel.hours && sel.hours.length) {
          h += '<div class="meta-row" style="align-items:flex-start;"><span class="meta-label">Hours</span><span class="meta-value"><div class="hours-grid">';
          sel.hours.forEach(function (hr) {
            h += '<div' + (/closed/i.test(hr) ? ' class="closed"' : '') + '>' + esc(hr) + '</div>';
          });
          h += '</div></span></div>';
        }

        h += '</div>';

        var reason = (data.llm_judgment && data.llm_judgment.reasoning && data.llm_judgment.reasoning !== 'N/A')
          ? data.llm_judgment.reasoning
          : 'The food tasted as good as my memory tells.';
        h += '<div class="reasoning reveal reveal-d3">'
          + '<div class="reasoning-label">Why this one</div>'
          + esc(reason) + '</div>';

        h += '</div>';
        return h;
      }

      /* ── Page 3: About ─────────────────────────────── */

      function buildPage3(data) {
        var h = '<div class="section-inner">';

        // Recent picks
        var recent = data.recent_picks || [];
        if (recent.length) {
          h += '<div class="recent-picks reveal reveal-d2">';
          h += '<div class="recent-picks-label">Recent Discoveries</div>';
          for (var i = 0; i < 3; i++) {
            var rp = recent[i];
            if (!rp) {
              h += '<div class="recent-pick-card recent-pick-empty"><span class="recent-pick-placeholder">&mdash;</span></div>';
            } else {
              var rpDate = '';
              try { rpDate = formatDate(rp.timestamp); } catch (e) {}
              h += '<div class="recent-pick-card">';
              if (rp.google_maps_url) {
                h += '<a href="' + esc(rp.google_maps_url) + '" target="_blank" rel="noopener" class="recent-pick-link">';
              }
              h += '<div class="recent-pick-name">' + esc(rp.name) + '</div>';
              h += '<div class="recent-pick-detail">';
              if (rp.neighborhood) h += esc(rp.neighborhood);
              if (rp.rating) h += ' &middot; ' + rp.rating + '\u2605';
              h += '</div>';
              if (rpDate) h += '<div class="recent-pick-date">' + rpDate + '</div>';
              if (rp.google_maps_url) h += '</a>';
              h += '</div>';
            }
          }
          h += '</div>';
        }

        h += '<ul class="about-rules reveal reveal-d3">'
          + '<li>No ads, no tracking, no cookies</li>'
          + '<li>No restaurant pays to appear</li>'
          + '<li>Selection is algorithmic</li>'
          + '</ul>';

        h += '<div class="about-links reveal reveal-d4">';
        h += '<a href="https://github.com/" target="_blank" rel="noopener" class="about-link">GitHub &rarr;</a>';
        h += '</div>';

        h += '<div class="about-footer reveal reveal-d5">'
          + 'An AI agent wandering Atlanta.<br>'
          + '<a href="mailto:tqlcos@gmail.com" style="color:var(--text-muted);">tqlcos@gmail.com</a>'
          + '</div>';
        h += '</div>';
        return h;
      }

      /* ── Render ─────────────────────────────────────── */

      function render(data) {
        var isDiscovery = !!data.selected;
        var sections = [];

        sections.push({ id: 'page-walk', html: buildPage1(data) });
        if (isDiscovery) {
          sections.push({ id: 'page-discovery', html: buildPage2(data) });
        }
        sections.push({ id: 'page-about', html: buildPage3(data) });

        var appHtml = '';

        // Sections
        sections.forEach(function (s) {
          appHtml += '<div class="section" id="' + s.id + '">' + s.html + '</div>';
        });

        document.getElementById('app').innerHTML = appHtml;

        // Init fullPage.js
        new fullpage('#app', {
          licenseKey: 'gplv3-license',
          autoScrolling: true,
          scrollingSpeed: 800,
          navigation: true,
          navigationPosition: 'right',
          css3: true,
          easing: 'easeInOutCubic',
          fitToSection: true,
          afterLoad: function (origin, destination) {
            // Trigger reveal animations on the active section
            var section = destination.item;
            var reveals = section.querySelectorAll('.reveal');
            reveals.forEach(function (el) { el.classList.add('visible'); });
          },
          onLeave: function (origin, destination) {
            // Drive trajectory animation based on leaving page 1
            updateTrajectory(origin, destination);
          }
        });

        // Trigger reveals on first section immediately
        var firstReveals = document.querySelectorAll('.section:first-child .reveal');
        firstReveals.forEach(function (el) { el.classList.add('visible'); });

        // ── Scroll-driven trajectory animation ──────────
        initTrajectoryScroll();
      }

      // Trajectory state for fullPage callbacks
      var trajectoryState = { container: null, pathEl: null, glowEl: null, endpoints: null, rings: null, pathLen: 800, ready: false };

      function updateTrajectory(origin, destination) {
        var s = trajectoryState;
        if (!s.ready || !s.container) return;

        // Leaving page 1 → fade out trajectory
        if (origin.index === 0 && destination.index > 0) {
          s.container.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
          s.container.style.opacity = '0';
          s.container.style.transform = 'translateX(-50%) translateY(-40px) scale(1.05)';
        }
        // Returning to page 1 → fade back in
        if (destination.index === 0) {
          s.container.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
          s.container.style.opacity = '1';
          s.container.style.transform = 'translateX(-50%) translateY(0) scale(1)';
        }
      }

      function initTrajectoryScroll() {
        var s = trajectoryState;
        s.container = document.querySelector('.trajectory-container');
        if (!s.container) return;

        s.pathEl = s.container.querySelector('.trajectory-path');
        s.glowEl = s.container.querySelector('.trajectory-glow');
        s.endpoints = s.container.querySelectorAll('.trajectory-endpoint');
        s.rings = s.container.querySelectorAll('.endpoint-ring');
        if (!s.pathEl) return;

        try { s.pathLen = s.pathEl.getTotalLength(); } catch (e) {}

        var DRAW_DURATION = 3700;
        setTimeout(function () {
          s.pathEl.classList.add('scroll-driven');
          s.pathEl.style.strokeDasharray = s.pathLen;
          s.pathEl.style.strokeDashoffset = '0';

          s.glowEl.classList.add('scroll-driven');
          s.glowEl.style.strokeDasharray = s.pathLen;
          s.glowEl.style.strokeDashoffset = '0';

          s.endpoints.forEach(function (el) { el.classList.add('scroll-driven'); el.style.opacity = '1'; });
          s.rings.forEach(function (el) { el.classList.add('scroll-driven'); el.style.opacity = '0.4'; });

          s.ready = true;
        }, DRAW_DURATION);
      }

      /* ── Fetch ──────────────────────────────────────── */

      fetch('data/current.json')
        .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(render)
        .catch(function (e) {
          document.getElementById('loading').textContent = 'Failed to load.';
          console.error('Drift:', e);
        });
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/fullpage.js@4/dist/fullpage.min.js"></script>
</body>
